<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#161410"/>

  <!-- D20 outer polygon (icosahedron face shape) -->
  <!-- Main pentagon-like d20 shape -->
  <polygon
    points="50,8 92,35 82,78 18,78 8,35"
    fill="#1e1b16"
    stroke="#c8922a"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- Inner triangle lines (d20 face details) -->
  <!-- Top triangle -->
  <polygon
    points="50,8 92,35 8,35"
    fill="none"
    stroke="#c8922a"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Bottom left triangle -->
  <line x1="8" y1="35" x2="18" y2="78" stroke="#c8922a" stroke-width="1.5"/>
  <!-- Bottom right triangle -->
  <line x1="92" y1="35" x2="82" y2="78" stroke="#c8922a" stroke-width="1.5"/>
  <!-- Center lines from top -->
  <line x1="50" y1="8" x2="50" y2="78" stroke="#c8922a" stroke-width="1.5" opacity="0.5"/>
  <!-- Horizontal mid line -->
  <line x1="8" y1="35" x2="92" y2="35" stroke="#c8922a" stroke-width="1.5" opacity="0.5"/>

  <!-- "20" text -->
  <text
    x="50"
    y="62"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="22"
    font-weight="bold"
    fill="#e8b44a"
  >20</text>
</svg>
